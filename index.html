<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Satish official </title>
    <meta name="description" content="Satish Official. Suniye naye aur purane top Bhojpuri gaane.">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Satish Official",
      "url": "https://tumhari-website-ka-link.com",
      "image": "https://tumhari-website-ka-link.com/favicon.png",
      "jobTitle": "Web Developer & Music Hub Creator"
    }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --blood: #ff0000; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: #000; border-bottom: 2px solid var(--blood);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { color: var(--blood); font-size: 22px; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px var(--blood); }

        .search-area { display: flex; width: 65%; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--blood); background: #111; color: #fff; outline: none; font-size: 14px; }
        .btn-s { padding: 10px 12px; background: var(--blood); border: none; color: #fff; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .container { padding: 15px 5%; }
        #watch-view { display: none; }

        /* PLAYER BOX */
        .player-box { background: #000; border: 2px solid var(--blood); border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 0 15px var(--blood); }
        .iframe-wrap { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        .iframe-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .controls { padding: 15px; background: #0a0a0a; text-align: center; }
        .v-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        
        .btn-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .btn-action { padding: 10px 18px; border: 1px solid var(--blood); background: #000; color: #fff; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-home { background: var(--blood); width: 100%; margin-top: 15px; border: none; padding: 12px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* GRID */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .card:hover { border-color: var(--blood); transform: scale(1.03); }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 8px; font-size: 11px; height: 40px; overflow: hidden; color: #ccc; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">SATISH OFFICIAL</div>
    <div class="search-area">
        <input type="text" id="srch" placeholder="Gana likhein ya mike dabayein...">
        <button class="btn-s" onclick="search()">KHOJEIN</button>
        <button class="btn-s" onclick="startVoice()">🎤</button>
    </div>
</header>

<div class="container">
    <div id="home-view">
        <h3 id="gridTitle" style="margin-bottom:15px; color:var(--blood); font-size: 18px;">TOP 50 BHOJPURI DHAMAKA</h3>
        <div class="video-grid" id="mainGrid"></div>
    </div>

    <div id="watch-view">
        <div class="player-box">
            <div class="iframe-wrap" id="playerParent">
                <div id="player"></div>
            </div>
            <div class="controls">
                <div class="v-title" id="vTitle">Gana Chal Raha Hai...</div>
                <div class="btn-group">
                    <button class="btn-action" onclick="player.playVideo()">PLAY</button>
                    <button class="btn-action" onclick="player.pauseVideo()">PAUSE</button>
                    <button class="btn-action" onclick="next()">NEXT</button>
                </div>
                <button class="btn-home" onclick="goHome()">🏠 WAPAS HOME PAR JAYEIN</button>
            </div>
        </div>
        
        <h3 style="margin-bottom:15px; color:var(--blood); font-size: 16px;">AAPKE LIYE 50 KHAS GAANE</h3>
        <div class="video-grid" id="sideGrid"></div>
    </div>
</div>

<script>
    // Agar ye key kaam na kare, to apni nayi YouTube API Key yaha dalein
    const KEY = 'AIzaSyAiy3YkvJAec66NMIr2ulZToesvphZ4UMs'; 
    let player, currentList = [], currentId = "";
    let apiReady = false;

    // YouTube API Load
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: { 
                'autoplay': 1, 
                'controls': 1, 
                'rel': 0, 
                'modestbranding': 1,
                'vq': 'auto' // Slow internet friendly
            },
            events: {
                'onReady': () => { apiReady = true; },
                'onStateChange': (e) => { if(e.data == YT.PlayerState.ENDED) next(); }
            }
        });
    }

    async function load(q, grid, limit = 50) {
        const gridDiv = document.getElementById(grid);
        gridDiv.innerHTML = '<p style="color:var(--blood)">Loading...</p>';
        
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${limit}&q=${encodeURIComponent(q)}&type=video&videoDuration=medium&key=${KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data.items) {
                currentList = data.items;
                gridDiv.innerHTML = '';
                currentList.forEach(i => {
                    gridDiv.innerHTML += `
                    <div class="card" onclick="play('${i.id.videoId}','${i.snippet.title.replace(/'/g,"")}')">
                        <img src="${i.snippet.thumbnails.medium.url}">
                        <div class="card-info"><b>${i.snippet.title}</b></div>
                    </div>`;
                });
            }
        } catch(e) { gridDiv.innerHTML = '<p>Internet Check Karein!</p>'; }
    }

    function play(id, t) {
        currentId = id;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('watch-view').style.display = 'block';
        document.getElementById('vTitle').innerText = t;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Player check and load
        if (apiReady && player && player.loadVideoById) {
            player.loadVideoById({ videoId: id, suggestedQuality: 'default' });
        } else {
            // Manual fallback if API fails
            document.getElementById('playerParent').innerHTML = `<iframe id="player" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; fullscreen"></iframe>`;
        }
        
        load(t + " songs", 'sideGrid', 50);
    }

    function search() {
        let q = document.getElementById('srch').value;
        if(q) {
            document.getElementById('gridTitle').innerText = "Search: " + q;
            load(q, 'mainGrid', 50);
            goHome();
        }
    }

    function startVoice() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Rec) return alert("Mic Problem");
        const r = new Rec();
        r.onresult = (e) => {
            document.getElementById('srch').value = e.results[0][0].transcript;
            search();
        };
        r.start();
    }

    function goHome() {
        if(player && player.stopVideo) player.stopVideo();
        document.getElementById('watch-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
    }

    function next() {
        if (currentList.length > 0) {
            let idx = Math.floor(Math.random() * currentList.length);
            play(currentList[idx].id.videoId, currentList[idx].snippet.title);
        }
    }

    window.onload = () => load('Bhojpuri Hits 2026', 'mainGrid', 50);
</script>
</body>
</html>
